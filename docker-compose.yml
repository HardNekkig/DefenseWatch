services:
  defensewatch:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - /var/log/auth.log:/var/log/auth.log:ro
      - /var/log/nginx:/var/log/nginx:ro
    environment:
      - DEFENSEWATCH_LOG_FORMAT=json
      # - DEFENSEWATCH_SHODAN_API_KEY=
      # - DEFENSEWATCH_VIRUSTOTAL_API_KEY=
      # - DEFENSEWATCH_CENSYS_API_ID=
      # - DEFENSEWATCH_CENSYS_API_SECRET=
      # - DEFENSEWATCH_WEBHOOK_URL=
    restart: unless-stopped
